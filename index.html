function allMatches() {

  return list;
}
const ALL_MATCHES = allMatches();
const ALL_MATCH_IDS = ALL_MATCHES.map(m => m.id);

// ESPN sometimes uses different display names than ours - map ESPN name -> our name
const ESPN_NAME_MAP = {
  'South Korea': 'South Korea',
  'Korea Republic': 'South Korea',
  'USA': 'USA',
  'United States': 'USA',
  'IR Iran': 'Iran',
  'Iran': 'Iran',
  'Saudi Arabia': 'Saudi Arabia',
  'KSA': 'Saudi Arabia',
  'England': 'England',

};

function normalizeTeamName(espnName) {
  if (!espnName) return espnName;
  return ESPN_NAME_MAP[espnName] || espnName;
}

// Build a lookup of "TeamA|TeamB" (sorted) -> matchId for group stage matches
function buildGroupMatchLookup() {
  const lookup = {};
  Object.entries(GROUPS).forEach(([g, ms]) => {
    ms.forEach((m, i) => {
      const key = [m.h, m.a].sort().join('|');
      lookup[key] = `${g}_${i}`;
    });
  });
  return lookup;
}
const GROUP_MATCH_LOOKUP = buildGroupMatchLookup();

// Parse ESPN scoreboard response into { matchId: { result, score_home, score_away } } for completed matches
function parseEspnResults(espnData) {
  const out = {};
  const events = espnData?.events || [];
  events.forEach(ev => {
    const comp = ev?.competitions?.[0];
    if (!comp) return;
    const completed = comp?.status?.type?.completed;
    if (!completed) return;

    const competitors = comp.competitors || [];
    const home = competitors.find(c => c.homeAway === 'home');
    const away = competitors.find(c => c.homeAway === 'away');
    if (!home || !away) return;

    const homeName = normalizeTeamName(home.team?.displayName || home.team?.name);
    const awayName = normalizeTeamName(away.team?.displayName || away.team?.name);
    const homeScore = home.score !== undefined ? Number(home.score) : null;
    const awayScore = away.score !== undefined ? Number(away.score) : null;
    if (homeScore === null || awayScore === null) return;

    const key = [homeName, awayName].sort().join('|');
    const matchId = GROUP_MATCH_LOOKUP[key];
    if (!matchId) return; // not a group match we're tracking (or knockout - matched separately later)

    // Figure out which of our h/a corresponds to ESPN's home/away to set result correctly
    const match = ALL_MATCHES.find(m => m.id === matchId);
    let ourHomeScore, ourAwayScore;
    if (match.h === homeName) {
      ourHomeScore = homeScore; ourAwayScore = awayScore;
    } else {
      ourHomeScore = awayScore; ourAwayScore = homeScore;
    }

    let result;
    if (ourHomeScore > ourAwayScore) result = 'home';
    else if (ourHomeScore < ourAwayScore) result = 'away';
    else result = 'draw';

    out[matchId] = { result, score_home: ourHomeScore, score_away: ourAwayScore };
  });
  return out;
}

      ]);
      if (e1 || e2 || e3) throw (e1 || e2 || e3);
      if (e4) console.error('Status load error', e4);

      setPlayers((pl || []).map(p => p.name));

      const picksByPlayer = {};
      (pk || []).forEach(row => {
        if (!picksByPlayer[row.player_name]) picksByPlayer[row.player_name] = {};
        picksByPlayer[row.player_name][row.match_id] = {
          result: row.result,
          score_home: row.score_home,
          score_away: row.score_away
        };
      });
      setPicks(picksByPlayer);

      const resultsByMatch = {};
      (rs || []).forEach(row => {
        resultsByMatch[row.match_id] = {
          result: row.result,
          score_home: row.score_home,
          score_away: row.score_away
        };
      });
      setResults(resultsByMatch);
      if (st) setLocks({ group_locked: !!st.group_locked, knockout_locked: !!st.knockout_locked });
      setSyncOk(true);
    } catch (err) {
      console.error('Load error', err);
      setSyncOk(false);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  // Realtime subscriptions
  useEffect(() => {
    const channel = supabase.channel('wc2026-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, loadAll)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'picks' }, loadAll)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'results' }, loadAll)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'tournament_status' }, loadAll)
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, [loadAll]);

  const addPlayer = async (name) => {
    name = name.trim();
    if (!name) { showToast('Enter a name'); return; }
    if (players.includes(name)) { showToast('Name already added'); return; }
    const { error } = await supabase.from('players').insert({ name });
    if (error) { showToast('Could not add player'); console.error(error); return; }
    setPlayers(prev => [...prev, name]);
    showToast(`${name} added`);
  };

  const removePlayer = async (name) => {
    const { error } = await supabase.from('players').delete().eq('name', name);
    if (error) { showToast('Could not remove player'); console.error(error); return; }
    await supabase.from('picks').delete().eq('player_name', name);
    setPlayers(prev => prev.filter(p => p !== name));
    setPicks(prev => { const c = { ...prev }; delete c[name]; return c; });
    showToast(`${name} removed`);
  };

  const savePicksForPlayer = async (playerName, playerPicks) => {
    const rows = Object.entries(playerPicks)
      .filter(([, v]) => v && v.result)
      .map(([matchId, v]) => ({
        player_name: playerName,
        match_id: matchId,
        result: v.result,
        score_home: v.score_home === '' || v.score_home === undefined ? null : Number(v.score_home),
        score_away: v.score_away === '' || v.score_away === undefined ? null : Number(v.score_away)
      }));
    if (rows.length === 0) { showToast('No picks to save'); return false; }
    const { error } = await supabase.from('picks').upsert(rows, { onConflict: 'player_name,match_id' });
    if (error) { showToast('Save failed - check connection'); console.error(error); return false; }
    return true;
  };

  const saveResult = async (matchId, result, scoreHome, scoreAway) => {
    if (!result) {
      const { error } = await supabase.from('results').delete().eq('match_id', matchId);
      if (error) { console.error(error); return false; }
      setResults(prev => { const c = { ...prev }; delete c[matchId]; return c; });
      return true;
    }
    const row = {
      match_id: matchId,
      result,
      score_home: scoreHome === '' || scoreHome === undefined ? null : Number(scoreHome),
      score_away: scoreAway === '' || scoreAway === undefined ? null : Number(scoreAway)
    };
    const { error } = await supabase.from('results').upsert(row, { onConflict: 'match_id' });
    if (error) { showToast('Save failed'); console.error(error); return false; }
    setResults(prev => ({ ...prev, [matchId]: { result, score_home: row.score_home, score_away: row.score_away } }));
    return true;
  };

  const resultsCount = Object.keys(results).length;
  const [refreshing, setRefreshing] = useState(false);

  const refresh = useCallback(async () => {
    setRefreshing(true);
    await loadAll();
    setRefreshing(false);
    showToast('Refreshed');
  }, [loadAll, showToast]);

  const adminLogin = (password) => {
    if (password === ADMIN_PASSWORD) {
      sessionStorage.setItem('wc2026_admin', 'true');
      setIsAdmin(true);
      showToast('Admin unlocked');
      return true;
    }
    showToast('Incorrect password');
    return false;
  };

  const adminLogout = () => {
    sessionStorage.removeItem('wc2026_admin');
    setIsAdmin(false);
    showToast('Logged out of admin');
  };

  const setLock = async (field, value) => {
    const { error } = await supabase.from('tournament_status')
      .upsert({ id: 1, [field]: value }, { onConflict: 'id' });
    if (error) { showToast('Could not update lock'); console.error(error); return; }
    setLocks(prev => ({ ...prev, [field]: value }));
    showToast(value ? 'Locked' : 'Unlocked');
  };

  // ---- ESPN sync ----
  const [espnSyncing, setEspnSyncing] = useState(false);
  const [espnLastSync, setEspnLastSync] = useState(null);
  const [espnError, setEspnError] = useState(false);

  const syncFromEspn = useCallback(async (silent) => {
    setEspnSyncing(true);
    try {
      const resp = await fetch(ESPN_PROXY_URL);
      if (!resp.ok) throw new Error('ESPN proxy error ' + resp.status);
      const data = await resp.json();
      const parsed = parseEspnResults(data);

      const rows = Object.entries(parsed).map(([matchId, v]) => ({
        match_id: matchId,
        result: v.result,
        score_home: v.score_home,
        score_away: v.score_away
      }));

      if (rows.length > 0) {
        const { error } = await supabase.from('results').upsert(rows, { onConflict: 'match_id' });
        if (error) throw error;
        setResults(prev => {
          const next = { ...prev };
          rows.forEach(r => { next[r.match_id] = { result: r.result, score_home: r.score_home, score_away: r.score_away }; });
          return next;
        });
      }
      setEspnLastSync(new Date());
      setEspnError(false);
      if (!silent) showToast(rows.length > 0 ? `Synced ${rows.length} result${rows.length === 1 ? '' : 's'} from ESPN` : 'No new results from ESPN');
    } catch (err) {
      console.error('ESPN sync error', err);
      setEspnError(true);
      if (!silent) showToast('ESPN sync failed - check worker proxy');
    } finally {
      setEspnSyncing(false);
    }
  }, [showToast]);

  // Auto-poll ESPN every 60s
  useEffect(() => {
    syncFromEspn(true);
    const interval = setInterval(() => syncFromEspn(true), 60000);
    return () => clearInterval(interval);
  }, [syncFromEspn]);

  return (
    <div className="app">
      <Header players={players} resultsCount={resultsCount} syncOk={syncOk} onRefresh={refresh} refreshing={refreshing} />
      <Nav tab={tab} setTab={setTab} />
      {loading ? (
        <div className="loading"><div className="spinner"></div>Loading tournament data...</div>
      ) : (
        <>
          {tab === 'setup' && <SetupTab players={players} addPlayer={addPlayer} removePlayer={removePlayer} locks={locks} isAdmin={isAdmin} setLock={setLock} adminLogin={adminLogin} adminLogout={adminLogout} />}
          {tab === 'picks' && <PicksTab players={players} picks={picks} setPicks={setPicks} savePicksForPlayer={savePicksForPlayer} showToast={showToast} locks={locks} />}
          {tab === 'results' && <ResultsTab results={results} saveResult={saveResult} showToast={showToast} onEspnSync={() => syncFromEspn(false)} espnSyncing={espnSyncing} espnLastSync={espnLastSync} espnError={espnError} />}
          {tab === 'leaderboard' && <LeaderboardTab players={players} picks={picks} results={results} />}
        </>
      )}
      <div className="footer-note">BTB World Cup 2026 Fantasy Challenge &middot; shared live via Supabase</div>
      <div className={`toast ${toast ? 'show' : ''}`}>{toast}</div>
    </div>
  );
}

        <div className="rules-divider"></div>
        <div className="lock-row">
          <div>
            <div className="lock-title">Knockout stage picks</div>
            <div className="lock-sub">{locks.knockout_locked ? 'Locked \u2014 picks are read-only' : 'Open \u2014 players can edit picks'}</div>

        <div className="rules-divider"></div>
        <div className="rules-row"><span>Quarter-final &middot; correct result</span><span className="pts">4 pts</span></div>

          Knockout fixtures (e.g. "1A vs 2B") use group winners/runners-up, which aren't known until group play finishes.

function MatchCard({ m, pick, onSetPick, onSetScore, locked }) {
  const result = pick?.result;
  return (
    <div className={`match-card ${locked ? 'locked' : ''}`}>
      <div className="match-meta">{m.pts} pts{!m.allowDraw ? ' \u00b7 knockout' : ''}</div>
      <div className="match-teams">
        <div className="team-home">
          <div className="team-flag">{m.hf}</div>
          <div className="team-name">{m.h}</div>
        </div>
        <div className="match-sep">vs</div>
        <div className="team-away">
          <div className="team-flag">{m.af}</div>
          <div className="team-name">{m.a}</div>
        </div>
      </div>
      <div className="result-btns">
        <button className={`result-btn ${result==='home'?'picked-home':''}`} disabled={locked} onClick={() => onSetPick(m.id, 'home')}>{m.h.split(' ')[0]} win</button>
        {m.allowDraw && <button className={`result-btn ${result==='draw'?'picked-draw':''}`} disabled={locked} onClick={() => onSetPick(m.id, 'draw')}>Draw</button>}
        <button className={`result-btn ${result==='away'?'picked-away':''}`} disabled={locked} onClick={() => onSetPick(m.id, 'away')}>{m.a.split(' ')[0]} win</button>
      </div>
      <div className="score-inputs">
        <input type="number" min="0" max="20" placeholder="0" disabled={locked}
          value={pick?.score_home ?? ''}
          onChange={e => onSetScore(m.id, 'score_home', e.target.value)} />
        <span className="score-sep">&ndash;</span>
        <input type="number" min="0" max="20" placeholder="0" disabled={locked}
          value={pick?.score_away ?? ''}
          onChange={e => onSetScore(m.id, 'score_away', e.target.value)} />
      </div>
      <div className="score-hint">Optional: predicted score (+1 pt if exact)</div>
    </div>
  );
}

function PicksTab({ players, picks, setPicks, savePicksForPlayer, showToast, locks }) {
  const [active, setActive] = useState(players[0] || null);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  useEffect(() => {
    if (!active || !players.includes(active)) setActive(players[0] || null);
  }, [players, active]);

  if (players.length === 0) {
    return <div className="empty-state"><div className="icon">⚽</div>Add players in the Setup tab first.</div>;
  }

  const playerPicks = picks[active] || {};
  const done = ALL_MATCH_IDS.filter(id => playerPicks[id]?.result).length;
  const total = ALL_MATCH_IDS.length;
  const pct = Math.round((done / total) * 100);
  const groupLocked = !!locks?.group_locked;
  const koLocked = !!locks?.knockout_locked;
  const allLocked = groupLocked && koLocked;

  const onSetPick = (matchId, result) => {
    setPicks(prev => {
      const playerMap = { ...(prev[active] || {}) };
      playerMap[matchId] = { ...(playerMap[matchId] || {}), result };
      return { ...prev, [active]: playerMap };
    });
    setSaved(false);
  };

  const onSetScore = (matchId, field, val) => {
    setPicks(prev => {
      const playerMap = { ...(prev[active] || {}) };
      playerMap[matchId] = { ...(playerMap[matchId] || {}), [field]: val };
      return { ...prev, [active]: playerMap };
    });
    setSaved(false);
  };

  const onSave = async () => {
    setSaving(true);
    const ok = await savePicksForPlayer(active, picks[active] || {});
    setSaving(false);
    if (ok) {
      setSaved(true);
      showToast(`${active}'s picks saved`);
      setTimeout(() => setSaved(false), 2000);
    }
  };

  const groupEntries = Object.entries(GROUPS);

  return (
    <div>
      {groupLocked && (
        <div className="lock-banner">
          <span>🔒</span>
          <span>Group stage picks are locked &mdash; the tournament has started for this stage.</span>
        </div>
      )}
      {koLocked && (
        <div className="lock-banner">
          <span>🔒</span>
          <span>Knockout stage picks are locked.</span>
        </div>
      )}
      <p className="section-label">Picking for</p>
      <div className="player-selector">
        {players.map(p => (
          <button key={p} className={`player-btn ${p === active ? 'selected' : ''}`} onClick={() => setActive(p)}>{p}</button>
        ))}
      </div>
      <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'1.25rem'}}>
        <div className="progress-bar"><div className="progress-fill" style={{width: `${pct}%`}}></div></div>
        <span style={{fontSize:'12px', color:'var(--text-secondary)', whiteSpace:'nowrap'}}>{done}/{total} picked</span>
      </div>

      <p className="section-label">Group stage</p>
      {groupEntries.map(([g, ms]) => (
        <div key={g}>
          <div className="group-header"><span className="group-badge">Group {g}</span></div>
          {ms.map((m, i) => {
            const mid = `${g}_${i}`;
            const match = ALL_MATCHES.find(x => x.id === mid);
            return <MatchCard key={mid} m={match} pick={playerPicks[mid]} onSetPick={onSetPick} onSetScore={onSetScore} locked={groupLocked} />;
          })}
        </div>
      ))}

      <p className="section-label" style={{marginTop:'1.5rem'}}>Knockout stage</p>
      {KO_ROUNDS.map(r => (
        <div key={r.id}>
          <div className="ko-round-label">{r.label}</div>
          {r.matches.map(m => {
            const match = ALL_MATCHES.find(x => x.id === m.id);
            return <MatchCard key={m.id} m={match} pick={playerPicks[m.id]} onSetPick={onSetPick} onSetScore={onSetScore} locked={koLocked} />;
          })}
        </div>
      ))}

      <button className={`save-btn ${saved ? 'saved' : ''}`} onClick={onSave} disabled={saving || allLocked}>
        {saving ? 'Saving...' : saved ? `\u2713 Saved` : allLocked ? 'Picks locked' : `Save ${active}'s picks`}
      </button>
    </div>
  );
}

function ResultEntry({ m, result, onSave }) {
  const [val, setVal] = useState(result?.result || '');
  const [sh, setSh] = useState(result?.score_home ?? '');
  const [sa, setSa] = useState(result?.score_away ?? '');

  useEffect(() => {
    setVal(result?.result || '');
    setSh(result?.score_home ?? '');
    setSa(result?.score_away ?? '');
  }, [result]);

  const commit = (newVal, newSh, newSa) => onSave(m.id, newVal, newSh, newSa);

  return (
    <div className="admin-card">
      <div className="result-row">
        <span className="r-name">{m.hf} {m.h}</span>
        <span className="r-vs">vs</span>
        <span className="r-name">{m.af} {m.a}</span>
        <select value={val} onChange={e => { setVal(e.target.value); commit(e.target.value, sh, sa); }}>
          <option value="">no result</option>
          <option value="home">{m.h} win</option>
          {m.allowDraw && <option value="draw">Draw</option>}
          <option value="away">{m.a} win</option>
        </select>
      </div>
      <div className="score-inputs" style={{marginTop:'8px'}}>
        <input type="number" min="0" max="20" placeholder="0" value={sh}
          onChange={e => { setSh(e.target.value); }}
          onBlur={() => commit(val, sh, sa)} />
        <span className="score-sep">&ndash;</span>
        <input type="number" min="0" max="20" placeholder="0" value={sa}
          onChange={e => { setSa(e.target.value); }}
          onBlur={() => commit(val, sh, sa)} />
      </div>
    </div>
  );
}

  const onSave = async (matchId, result, sh, sa) => {
    const ok = await saveResult(matchId, result, sh, sa);
    if (ok) showToast('Result saved');
  };

  const lastSyncLabel = espnLastSync
    ? espnLastSync.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : null;

  return (
    <div>
      <p className="section-label">Enter actual match results</p>
      <div className="card espn-sync-card">
        <div>
          <div className="lock-title">Live results from ESPN</div>
          <div className="lock-sub">
            {espnError ? 'Sync failed \u2014 check Cloudflare worker proxy' : lastSyncLabel ? `Last synced ${lastSyncLabel} \u00b7 auto-refreshes every minute` : 'Syncing...'}
          </div>
        </div>
        <button className="btn" onClick={onEspnSync} disabled={espnSyncing}>
          {espnSyncing ? 'Syncing...' : 'Sync now'}
        </button>
      </div>
      <p style={{fontSize:'13px', color:'var(--text-secondary)', marginBottom:'1rem'}}>
        Group stage results auto-sync from ESPN. You can still enter or correct results manually below &mdash; the leaderboard updates live for everyone.
      </p>

      <p className="section-label">Group stage</p>
      {Object.entries(GROUPS).map(([g, ms]) => (
        <div key={g}>
          <div className="group-header"><span className="group-badge">Group {g}</span></div>
          {ms.map((m, i) => {
            const mid = `${g}_${i}`;
            const match = ALL_MATCHES.find(x => x.id === mid);
            return <ResultEntry key={mid} m={match} result={results[mid]} onSave={onSave} />;
          })}
        </div>
      ))}

      <p className="section-label" style={{marginTop:'1.5rem'}}>Knockout stage</p>
      <p style={{fontSize:'12px', color:'var(--text-tertiary)', marginTop:'-0.5rem', marginBottom:'0.75rem'}}>
        Knockout results aren't auto-synced (bracket teams aren't known until groups finish) &mdash; enter these manually.
      </p>
      {KO_ROUNDS.map(r => (
        <div key={r.id}>
          <div className="ko-round-label">{r.label}</div>
          {r.matches.map(m => {
            const match = ALL_MATCHES.find(x => x.id === m.id);
            return <ResultEntry key={m.id} m={match} result={results[m.id]} onSave={onSave} />;
          })}
        </div>
      ))}
    </div>
  );
}

function roundPts(mid) {
  if (mid.startsWith('r16')) return 3;
  if (mid.startsWith('qf')) return 4;
  if (mid.startsWith('sf')) return 6;
  if (mid.startsWith('final')) return 8;
  return 2;
}

function calcPoints(playerPicks, results) {
  let pts = 0, correct = 0, exact = 0;
  Object.entries(results).forEach(([mid, actual]) => {
    const pick = playerPicks[mid];
    if (!pick || !pick.result) return;
    const rp = roundPts(mid);
    if (pick.result === actual.result) {
      pts += rp;
      correct++;
      if (
        pick.score_home !== null && pick.score_home !== undefined && pick.score_home !== '' &&
        pick.score_away !== null && pick.score_away !== undefined && pick.score_away !== '' &&
        actual.score_home !== null && actual.score_away !== null &&
        Number(pick.score_home) === Number(actual.score_home) &&
        Number(pick.score_away) === Number(actual.score_away)
      ) {
        pts += 1;
        exact++;
      }
    }
  });
  return { pts, correct, exact };
}

function LeaderboardTab({ players, picks, results }) {
  if (players.length === 0) {
    return <div className="empty-state"><div className="icon">⚽</div>Add players in the Setup tab first.</div>;
  }

  const data = players
    .map(p => ({ name: p, ...calcPoints(picks[p] || {}, results) }))
    .sort((a, b) => b.pts - a.pts);

  const medals = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];
  const completedMatches = ALL_MATCHES.filter(m => results[m.id]);

  return (
    <div>
      <p className="section-label">Leaderboard &middot; {completedMatches.length} results in</p>
      <div className="card">
        <div className="lb-header">
          <span>#</span><span>Player</span><span>Pts</span><span>Hits</span><span>Exact</span>
        </div>
        {data.map((p, i) => (
          <div className="lb-row" key={p.name}>
            <div className={`lb-rank ${i < 3 ? 'top' : ''}`}>{medals[i] || i + 1}</div>
            <div className="lb-name">{p.name}</div>
            <div className="lb-pts">{p.pts}</div>
            <div className="lb-sub">{p.correct}</div>
            <div className="lb-sub">{p.exact}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex', gap:'16px', flexWrap:'wrap', fontSize:'12px', color:'var(--text-tertiary)', marginTop:'0.5rem', padding:'0 4px'}}>
        <span>Pts = total points</span><span>Hits = correct results</span><span>Exact = exact scores</span>
      </div>

      {completedMatches.length > 0 && (
        <>
          <p className="section-label" style={{marginTop:'1.5rem'}}>Pick breakdown</p>
          {completedMatches.map(m => {
            const actual = results[m.id];
            return (
              <div className="card" key={m.id} style={{padding:'0.75rem 1.25rem'}}>
                <div style={{fontSize:'13px', fontWeight:600, marginBottom:'6px'}}>
                  {m.hf} {m.h} vs {m.af} {m.a}
                  <span style={{fontWeight:400, color:'var(--text-secondary)'}}>
                    {' '}&rarr; {actual.result === 'home' ? `${m.h} win` : actual.result === 'away' ? `${m.a} win` : 'Draw'}
                    {actual.score_home !== null && actual.score_away !== null ? ` (${actual.score_home}-${actual.score_away})` : ''}
                  </span>
                </div>
                <div className="picks-summary">
                  {players.map(p => {
                    const pick = (picks[p] || {})[m.id];
                    const correct = pick?.result === actual.result;
                    const cls = pick?.result === 'home' ? 'home' : pick?.result === 'draw' ? 'draw' : pick?.result === 'away' ? 'away' : 'none';
                    return (
                      <span key={p} className={`pick-pill ${cls}`} title={`${p}: ${pick?.result || 'no pick'}`}>
                        {p.split(' ')[0]} {correct ? '\u2713' : ''}{!pick?.result ? '\u2014' : ''}
                      </span>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
