// Parse one ESPN event into a simplified group-stage result, or null
function parseGroupEvent(ev) {
  const comp = ev?.competitions?.[0];
  if (!comp) return null;
  const slug = ev?.season?.slug;
  if (slug !== 'group-stage') return null;

  let groupName = null;
  if (comp.altGameNote) {
    const m = comp.altGameNote.match(/Group\s+([A-L])/i);
    if (m) groupName = m[1].toUpperCase();
  }
  if (!groupName) return null;

  const competitors = comp.competitors || [];
  const home = competitors.find(c => c.homeAway === 'home');
  const away = competitors.find(c => c.homeAway === 'away');
  if (!home || !away) return null;

  const homeTeam = normalizeTeam(home.team?.displayName || home.team?.name || '');
  const awayTeam = normalizeTeam(away.team?.displayName || away.team?.name || '');
  if (!homeTeam || !awayTeam) return null;

  const completed = !!comp.status?.type?.completed;
  if (!completed) return { groupName, homeTeam, awayTeam, completed: false };

  const hs = home.score !== undefined ? Number(home.score) : null;
  const as = away.score !== undefined ? Number(away.score) : null;
  if (hs === null || as === null) return null;

  return { groupName, homeTeam, awayTeam, completed: true, homeScore: hs, awayScore: as };
}

// Compute standings table for a group from a list of completed matches
function computeGroupStandings(groupName, matches) {
  const teams = GROUPS[groupName];
  const table = {};
  teams.forEach(t => { table[t] = { team: t, played: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0 }; });

  matches.forEach(m => {
    if (m.groupName !== groupName || !m.completed) return;
    const h = table[m.homeTeam];
    const a = table[m.awayTeam];
    if (!h || !a) return;
    h.played++; a.played++;
    h.gf += m.homeScore; h.ga += m.awayScore;
    a.gf += m.awayScore; a.ga += m.homeScore;
    if (m.homeScore > m.awayScore) { h.w++; a.l++; h.pts += 3; }
    else if (m.homeScore < m.awayScore) { a.w++; h.l++; a.pts += 3; }
    else { h.d++; a.d++; h.pts += 1; a.pts += 1; }
  });

  const rows = Object.values(table);
  rows.sort((x, y) => {
    if (y.pts !== x.pts) return y.pts - x.pts;
    const xgd = x.gf - x.ga, ygd = y.gf - y.ga;
    if (ygd !== xgd) return ygd - xgd;
    if (y.gf !== x.gf) return y.gf - x.gf;
    return x.team.localeCompare(y.team);
  });
  return rows;
}

    await supabase.from('group_picks').delete().eq('player_name', name);
    setPlayers(prev => prev.filter(p => p !== name));
    setGroupPicks(prev => { const c = { ...prev }; delete c[name]; return c; });
    showToast(`${name} removed`);
  };

  const adminLogin = (password) => {
    if (password === ADMIN_PASSWORD) {
      sessionStorage.setItem('wc2026_admin', 'true');
      setIsAdmin(true);
      showToast('Admin unlocked');
      return true;
    }
    showToast('Incorrect password');
    return false;
  };

  const adminLogout = () => {
    sessionStorage.removeItem('wc2026_admin');
    setIsAdmin(false);
    showToast('Logged out of admin');
  };

  const setLock = async (field, value) => {
    const { error } = await supabase.from('tournament_status')
      .upsert({ id: 1, [field]: value }, { onConflict: 'id' });
    if (error) { showToast('Could not update lock'); console.error(error); return; }
    setLocks(prev => ({ ...prev, [field]: value }));
    showToast(value ? 'Locked' : 'Unlocked');
  };

  // Sync group-stage results from ESPN to compute live standings (client-side, not stored)
  const syncFromEspn = useCallback(async () => {
    setEspnSyncing(true);
    try {
      const resp = await fetch(`${ESPN_PROXY_URL}?dates=${TOURNAMENT_DATES}`);
      if (!resp.ok) throw new Error('ESPN proxy error ' + resp.status);
      const data = await resp.json();
      const events = data?.events || [];
      const parsed = events.map(parseGroupEvent).filter(Boolean);
      setGroupMatches(parsed);
      setEspnLastSync(new Date());
      setEspnError(false);
      const completedCount = parsed.filter(m => m.completed).length;
      showToast(`Synced ${parsed.length} group matches (${completedCount} completed)`);
    } catch (err) {
      console.error('ESPN sync error', err);
      setEspnError(true);
      showToast('ESPN sync failed - check worker proxy');
    } finally {
      setEspnSyncing(false);
    }
  }, [showToast]);

  return (
    <div className="app">
      <Header players={players} syncOk={syncOk} onRefresh={refresh} refreshing={refreshing} />
      <Nav tab={tab} setTab={setTab} />
      {loading ? (
        <div className="loading"><div className="spinner"></div>Loading tournament data...</div>
      ) : (
        <>
          {tab === 'standings' && <StandingsTab groupMatches={groupMatches} onEspnSync={syncFromEspn} espnSyncing={espnSyncing} espnLastSync={espnLastSync} espnError={espnError} />}
          {tab === 'leaderboard' && <LeaderboardTab players={players} groupPicks={groupPicks} groupMatches={groupMatches} playoffMatches={playoffMatches} playoffPicks={playoffPicks} />}
          {tab === 'setup' && <SetupTab players={players} removePlayer={removePlayer} locks={locks} isAdmin={isAdmin} setLock={setLock} adminLogin={adminLogin} adminLogout={adminLogout} />}
        </>
      )}
      <div className="footer-note">BTB World Cup 2026 Fantasy Challenge &middot; shared live via Supabase</div>
      <div className={`toast ${toast ? 'show' : ''}`}>{toast}</div>
    </div>
  );
}

      </div>
      <div style={{display:'flex', alignItems:'center', gap:'12px'}}>

        <a href="./bracket.html" className="top-link">Bracket &rarr;</a>

function Nav({ tab, setTab }) {
  const tabs = [['standings','Standings'],['leaderboard','Leaderboard'],['setup','Setup']];
  return (
    <div className="nav">
      {tabs.map(([id, label]) => (

      ))}

  return (
    <div>
      <p className="section-label">Live group standings</p>
      <div className="card espn-sync-card">
        <div>
          <div className="lock-title">Synced from ESPN</div>
          <div className="lock-sub">
            {espnError ? 'Sync failed \u2014 check Cloudflare worker proxy' : lastSyncLabel ? `Last synced ${lastSyncLabel} \u00b7 ${completedCount} matches completed` : 'Tap Sync now to load live results'}
          </div>
        </div>
        <button className="btn" onClick={onEspnSync} disabled={espnSyncing}>
          {espnSyncing ? 'Syncing...' : 'Sync now'}
        </button>
      </div>

      {groupMatches.length === 0 ? (
        <div className="empty-state"><div className="icon">⚽</div>Tap "Sync now" to load live group standings from ESPN.</div>
      ) : (
        GROUP_NAMES.map(g => {
          const standings = computeGroupStandings(g, groupMatches);
          return (
            <div key={g}>
              <div className="group-header"><span className="group-badge">Group {g}</span></div>
              <div className="card" style={{padding: '0.5rem 1rem'}}>
                <table className="standings-table">
                  <thead>
                    <tr>
                      <th></th><th>Team</th><th className="num">P</th><th className="num">W</th><th className="num">D</th><th className="num">L</th><th className="num">GD</th><th className="num">Pts</th>
                    </tr>
                  </thead>
                  <tbody>
                    {standings.map((row, idx) => (
                      <tr key={row.team}>
                        <td><span className={`pos-pill ${idx < 2 ? 'advance' : 'out'}`}>{idx + 1}</span></td>
                        <td className="team-cell"><span>{flagFor(row.team)}</span><span>{row.team}</span></td>
                        <td className="num">{row.played}</td>
                        <td className="num">{row.w}</td>
                        <td className="num">{row.d}</td>
                        <td className="num">{row.l}</td>
                        <td className="num">{row.gf - row.ga > 0 ? '+' : ''}{row.gf - row.ga}</td>
                        <td className="num"><strong>{row.pts}</strong></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

// Score one player's group picks against current standings. Returns { total, perGroup: {g: pts} }
function scoreGroupPicks(playerPicks, groupMatches) {
  let total = 0;
  const perGroup = {};
  GROUP_NAMES.forEach(g => {
    const predicted = (playerPicks && playerPicks[g]) || GROUPS[g];
    const standings = computeGroupStandings(g, groupMatches);
    // Only score if at least one match in this group has been played - otherwise standings == default order, not meaningful
    const anyPlayed = standings.some(r => r.played > 0);
    let groupPts = 0;
    if (anyPlayed) {
      standings.forEach((row, idx) => {
        const actualRank = idx + 1; // 1-4
        const predictedIdx = predicted.indexOf(row.team);
        const predictedRank = predictedIdx === -1 ? null : predictedIdx + 1;
        if (predictedRank === actualRank) {
          // 1st=4pts, 2nd=3pts, 3rd=2pts, 4th=1pt
          groupPts += (5 - actualRank);
        }
      });
    }
    perGroup[g] = groupPts;
    total += groupPts;
  });
  return { total, perGroup };
}

function scorePlayoffPicks(playerPicks, playoffMatches) {
  let total = 0, correct = 0, completed = 0;
  playoffMatches.forEach(m => {
    if (!m.result) return;
    completed++;
    const pick = playerPicks && playerPicks[m.id];
    if (pick && pick === m.result) {
      total += m.pts;
      correct++;
    }
  });
  return { total, correct, completed };
}

function PlayerDetail({ player, groupMatches }) {
  const picks = player.perGroupPicks || {};
  const anyMatchesSynced = groupMatches.length > 0;

  return (
    <div className="card" style={{marginTop:'-4px', marginBottom:'0.75rem', background:'var(--surface-2)'}}>
      {!player.hasPicks ? (
        <p style={{fontSize:'13px', color:'var(--text-secondary)'}}>{player.name} hasn't submitted group picks yet.</p>
      ) : (
        GROUP_NAMES.map(g => {
          const predicted = picks[g] || GROUPS[g];
          const standings = computeGroupStandings(g, groupMatches);
          const anyPlayed = standings.some(r => r.played > 0);
          return (
            <div key={g} style={{marginBottom:'0.75rem'}}>
              <div style={{fontSize:'11px', fontWeight:600, color:'var(--text-tertiary)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:'4px'}}>Group {g}</div>
              <div style={{display:'flex', flexDirection:'column', gap:'2px'}}>
                {predicted.map((team, idx) => {
                  const predictedRank = idx + 1;
                  let mark = null;
                  if (anyMatchesSynced && anyPlayed) {
                    const actualRow = standings[idx]; // team actually in this position
                    const actualRank = standings.findIndex(r => r.team === team) + 1;
                    const correct = actualRank === predictedRank;
                    mark = correct ? '✓' : null;
                  }
                  return (
                    <div key={team} style={{display:'flex', alignItems:'center', gap:'8px', fontSize:'13px'}}>
                      <span style={{width:'18px', color:'var(--text-tertiary)', fontSize:'11px'}}>{predictedRank}.</span>
                      <span>{flagFor(team)}</span>
                      <span style={{flex:1}}>{team}</span>
                      {mark && <span style={{color:'var(--green-text)', fontWeight:700}}>{mark}</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

function LeaderboardTab({ players, groupPicks, groupMatches, playoffMatches, playoffPicks }) {
  const [expanded, setExpanded] = useState(null);

  if (players.length === 0) {
    return <div className="empty-state"><div className="icon">⚽</div>No players yet &mdash; share the picks link to get started.</div>;
  }

  const anyMatchesSynced = groupMatches.length > 0;
  const anyPlayoffSynced = playoffMatches.length > 0;
  const playoffCompleted = playoffMatches.filter(m => m.result).length;

  const data = players.map(p => {
    const { total: groupTotal, perGroup } = scoreGroupPicks(groupPicks[p], groupMatches);
    const { total: playoffTotal, correct: playoffCorrect } = scorePlayoffPicks(playoffPicks[p], playoffMatches);
    const hasPicks = !!groupPicks[p];
    return { name: p, groupTotal, playoffTotal, playoffCorrect, total: groupTotal + playoffTotal, perGroup, perGroupPicks: groupPicks[p], hasPicks };
  }).sort((a, b) => b.total - a.total);

  const medals = ['🥇', '🥈', '🥉'];

  return (
    <div>
      <p className="section-label">Overall leaderboard</p>
      {!anyMatchesSynced && (
        <div className="card">
          <p style={{fontSize:'13px', color:'var(--text-secondary)'}}>
            Scores will appear once group-stage results are synced from ESPN (Standings tab). Scoring: 4 pts for a correct
            1st place, 3 for 2nd, 2 for 3rd, 1 for 4th &mdash; per group, up to 48 pts total. Playoff bracket points are
            added once the knockout stage begins.
          </p>
        </div>
      )}
      <div className="card">
        <div className="lb-header">
          <span>#</span><span>Player</span><span>Pts</span>
        </div>
        {data.map((p, i) => (
          <React.Fragment key={p.name}>
            <div className="lb-row" style={{cursor:'pointer'}} onClick={() => setExpanded(expanded === p.name ? null : p.name)}>
              <div className={`lb-rank ${i < 3 ? 'top' : ''}`}>{medals[i] || i + 1}</div>
              <div className="lb-name">
                {p.name}{!p.hasPicks ? ' (no picks yet)' : ''}
                {anyPlayoffSynced && <div style={{fontSize:'11px', color:'var(--text-tertiary)', marginTop:'2px'}}>Group {p.groupTotal} &middot; Bracket {p.playoffTotal}</div>}
              </div>
              <div className="lb-pts">{p.total}</div>
            </div>
            {expanded === p.name && <PlayerDetail player={p} groupMatches={groupMatches} />}
          </React.Fragment>
        ))}
      </div>

      <p className="section-label" style={{marginTop:'1.5rem'}}>Playoff bracket</p>
      {!anyPlayoffSynced ? (
        <div className="empty-state">
          <div className="icon">🏆</div>
          Playoff leaderboard opens once the Round of 32 bracket is set and picks are in.
          <div style={{marginTop:'1rem'}}>
            <a className="top-link" href="./bracket.html">Go to bracket &rarr;</a>
          </div>
        </div>
      ) : (
        <div className="card">
          <p style={{fontSize:'13px', color:'var(--text-secondary)'}}>
            {playoffCompleted} of {playoffMatches.length} playoff matches completed. Points per correct pick:
            R32 = 1, R16 = 2, QF = 3, SF = 4, Final = 5.
          </p>
        </div>
      )}
    </div>
  );
}

function SetupTab({ players, removePlayer, locks, isAdmin, setLock, adminLogin, adminLogout }) {
  const [pw, setPw] = useState('');
  const submitAdmin = () => { if (adminLogin(pw)) setPw(''); };

  return (
    <div>
      <p className="section-label">Players</p>
      <div className="card">
        {players.length === 0 ? (
          <p style={{fontSize:'13px', color:'var(--text-secondary)'}}>No players registered yet. Share the <a href="./picks.html">picks page</a> with your group.</p>
        ) : (
          <div className="player-list">
            {players.map(p => (
              <div className="player-chip" key={p}>
                <span>{p}</span>
                {isAdmin && <button className="remove" onClick={() => removePlayer(p)} title="Remove">&times;</button>}
              </div>
            ))}
          </div>
        )}
      </div>

      <p className="section-label" style={{marginTop:'1.25rem'}}>Tournament status</p>
      <div className="card">
        <div className="lock-row">
          <div>
            <div className="lock-title">Group stage picks</div>
            <div className="lock-sub">{locks.group_picks_locked ? 'Locked \u2014 picks are read-only' : 'Open \u2014 players can edit picks'}</div>
          </div>
          <span className={`lock-pill ${locks.group_picks_locked ? 'locked' : 'open'}`}>{locks.group_picks_locked ? 'Locked' : 'Open'}</span>
        </div>
        <div className="rules-divider"></div>
        <div className="lock-row">
          <div>
            <div className="lock-title">Playoff bracket picks</div>
            <div className="lock-sub">{locks.playoff_picks_locked ? 'Locked \u2014 picks are read-only' : 'Open \u2014 players can edit picks'}</div>
          </div>
          <span className={`lock-pill ${locks.playoff_picks_locked ? 'locked' : 'open'}`}>{locks.playoff_picks_locked ? 'Locked' : 'Open'}</span>
        </div>

        {isAdmin ? (
          <div className="admin-controls">
            <div className="admin-controls-label">Admin controls</div>
            <div className="admin-btn-row">
              <button className="btn" onClick={() => setLock('group_picks_locked', !locks.group_picks_locked)}>
                {locks.group_picks_locked ? 'Unlock group stage' : 'Lock group stage'}
              </button>
              <button className="btn" onClick={() => setLock('playoff_picks_locked', !locks.playoff_picks_locked)}>
                {locks.playoff_picks_locked ? 'Unlock playoff bracket' : 'Lock playoff bracket'}
              </button>
            </div>
            <button className="btn-link" onClick={adminLogout}>Log out of admin</button>
          </div>
        ) : (
          <div className="admin-controls">
            <div className="admin-controls-label">Admin login</div>
            <div className="player-setup">
              <input type="password" placeholder="Admin password" value={pw}
                onChange={e => setPw(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') submitAdmin(); }} />
              <button className="btn" onClick={submitAdmin}>Unlock</button>
            </div>
          </div>
        )}
      </div>

      <p className="section-label" style={{marginTop:'1.25rem'}}>Scoring rules</p>
      <div className="card">
        <div className="rules-row"><span>Group stage &middot; correct 1st place</span><span className="pts">4 pts</span></div>
        <div className="rules-divider"></div>
        <div className="rules-row"><span>Group stage &middot; correct 2nd place</span><span className="pts">3 pts</span></div>
        <div className="rules-divider"></div>
        <div className="rules-row"><span>Group stage &middot; correct 3rd place</span><span className="pts">2 pts</span></div>
        <div className="rules-divider"></div>
        <div className="rules-row"><span>Group stage &middot; correct 4th place</span><span className="pts">1 pt</span></div>
        <div className="rules-divider"></div>
        <div className="rules-row"><span>Playoff &middot; Round of 32 correct pick</span><span className="pts">1 pt</span></div>
        <div className="rules-divider"></div>
        <div className="rules-row"><span>Playoff &middot; Round of 16 correct pick</span><span className="pts">2 pts</span></div>
        <div className="rules-divider"></div>
        <div className="rules-row"><span>Playoff &middot; Quarter-final correct pick</span><span className="pts">3 pts</span></div>
        <div className="rules-divider"></div>
        <div className="rules-row"><span>Playoff &middot; Semi-final correct pick</span><span className="pts">4 pts</span></div>
        <div className="rules-divider"></div>
        <div className="rules-row"><span>Playoff &middot; Final correct pick</span><span className="pts">5 pts</span></div>
      </div>

      <p className="section-label" style={{marginTop:'1.25rem'}}>How it works</p>
      <div className="card">
        <p style={{fontSize:'13px', color:'var(--text-secondary)'}}>
          Each player ranks the 4 teams in every group (1st-4th) before the tournament starts. Once group matches are played,
          live standings sync from ESPN and the leaderboard scores everyone's predictions automatically.
          After the group stage ends and the real Round of 32 bracket is known, a shared playoff bracket opens for
          a second round of picks &mdash; winners through R32, R16, QF, SF and the Final.
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
