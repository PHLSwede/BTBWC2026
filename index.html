function parseEspnEvent(ev) {
  const comp = ev?.competitions?.[0];
  if (!comp) return null;

  const slug = ev?.season?.slug;
  const round = SLUG_TO_ROUND[slug];
  if (!round) return null;

  let groupName = null;
  if (round === 'group' && comp.altGameNote) {
    const m = comp.altGameNote.match(/Group\s+([A-L])/i);
    if (m) groupName = m[1].toUpperCase();
  }

  const competitors = comp.competitors || [];
  const home = competitors.find(c => c.homeAway === 'home');
  const away = competitors.find(c => c.homeAway === 'away');
  if (!home || !away) return null;

  const homeTeam = home.team?.displayName || home.team?.name || home.team?.shortDisplayName;
  const awayTeam = away.team?.displayName || away.team?.name || away.team?.shortDisplayName;
  if (!homeTeam || !awayTeam) return null;

  const completed = !!comp.status?.type?.completed;
  let result = null;
  if (completed) {
    const hs = home.score !== undefined ? Number(home.score) : null;
    const as = away.score !== undefined ? Number(away.score) : null;
    if (hs !== null && as !== null) {
      if (hs > as) result = 'home';
      else if (hs < as) result = 'away';
      else result = 'draw';
    }
  }

  return {
    id: ev.id,
    round,
    group_name: groupName,
    home_team: homeTeam,
    away_team: awayTeam,
    home_flag: flagFor(homeTeam),
    away_flag: flagFor(awayTeam),
    match_date: ev.date || comp.date || null,
    pts: ROUND_POINTS[round] || 2,
    result
  };

    const { error } = await supabase.from('players').insert({ name });
    if (error) { showToast('Could not add player'); console.error(error); return; }
    setPlayers(prev => [...prev, name]);
    showToast(`${name} added`);
  };

  const removePlayer = async (name) => {
    const { error } = await supabase.from('players').delete().eq('name', name);
    if (error) { showToast('Could not remove player'); console.error(error); return; }
    await supabase.from('picks').delete().eq('player_name', name);
    setPlayers(prev => prev.filter(p => p !== name));
    setPicks(prev => { const c = { ...prev }; delete c[name]; return c; });
    showToast(`${name} removed`);
  };

  const savePicksForPlayer = async (playerName, playerPicks) => {
    const rows = Object.entries(playerPicks)
      .filter(([, v]) => v)
      .map(([matchId, pick]) => ({
        player_name: playerName,
        match_id: matchId,
        pick
      }));
    if (rows.length === 0) { showToast('No picks to save'); return false; }
    const { error } = await supabase.from('picks').upsert(rows, { onConflict: 'player_name,match_id' });
    if (error) { showToast('Save failed - check connection'); console.error(error); return false; }
    return true;
  };

  const resultsCount = matches.filter(m => m.result).length;
  const [refreshing, setRefreshing] = useState(false);

  const refresh = useCallback(async () => {
    setRefreshing(true);
    await loadAll();
    setRefreshing(false);
    showToast('Refreshed');
  }, [loadAll, showToast]);

  const adminLogin = (password) => {
    if (password === ADMIN_PASSWORD) {
      sessionStorage.setItem('wc2026_admin', 'true');
      setIsAdmin(true);
      showToast('Admin unlocked');
      return true;
    }
    showToast('Incorrect password');
    return false;
  };

  const adminLogout = () => {
    sessionStorage.removeItem('wc2026_admin');
    setIsAdmin(false);
    showToast('Logged out of admin');
  };

  const setLock = async (field, value) => {
    const { error } = await supabase.from('tournament_status')
      .upsert({ id: 1, [field]: value }, { onConflict: 'id' });
    if (error) { showToast('Could not update lock'); console.error(error); return; }
    setLocks(prev => ({ ...prev, [field]: value }));
    showToast(value ? 'Locked' : 'Unlocked');
  };

  const [espnSyncing, setEspnSyncing] = useState(false);
  const [espnLastSync, setEspnLastSync] = useState(null);
  const [espnError, setEspnError] = useState(false);

  const syncFromEspn = useCallback(async () => {
    setEspnSyncing(true);
    try {
      const resp = await fetch(`${ESPN_PROXY_URL}?dates=${TOURNAMENT_DATES}`);
      if (!resp.ok) throw new Error('ESPN proxy error ' + resp.status);
      const data = await resp.json();
      const events = data?.events || [];

      const rows = events.map(parseEspnEvent).filter(Boolean);

      if (rows.length > 0) {
        const { error } = await supabase.from('matches').upsert(rows, { onConflict: 'id' });
        if (error) throw error;
        setMatches(prev => {
          const byId = {};
          prev.forEach(m => { byId[m.id] = m; });
          rows.forEach(r => { byId[r.id] = { ...byId[r.id], ...r }; });
          return Object.values(byId);
        });
      }
      setEspnLastSync(new Date());
      setEspnError(false);
      showToast(rows.length > 0 ? `Synced ${rows.length} match${rows.length === 1 ? '' : 'es'} from ESPN` : 'No matches found from ESPN');
    } catch (err) {
      console.error('ESPN sync error', err);
      setEspnError(true);
      showToast('ESPN sync failed - check worker proxy');
    } finally {
      setEspnSyncing(false);
    }
  }, [showToast]);

  return (
    <div className="app">
      <Header players={players} resultsCount={resultsCount} syncOk={syncOk} onRefresh={refresh} refreshing={refreshing} />
      <Nav tab={tab} setTab={setTab} />
      {loading ? (
        <div className="loading"><div className="spinner"></div>Loading tournament data...</div>
      ) : (
        <>
          {tab === 'setup' && <SetupTab players={players} addPlayer={addPlayer} removePlayer={removePlayer} locks={locks} isAdmin={isAdmin} setLock={setLock} adminLogin={adminLogin} adminLogout={adminLogout} matches={matches} onEspnSync={syncFromEspn} espnSyncing={espnSyncing} espnLastSync={espnLastSync} espnError={espnError} />}
          {tab === 'picks' && <PicksTab players={players} matches={matches} picks={picks} setPicks={setPicks} savePicksForPlayer={savePicksForPlayer} showToast={showToast} locks={locks} />}
          {tab === 'results' && <ResultsTab matches={matches} onEspnSync={syncFromEspn} espnSyncing={espnSyncing} espnLastSync={espnLastSync} espnError={espnError} />}
          {tab === 'leaderboard' && <LeaderboardTab players={players} matches={matches} picks={picks} />}
        </>
      )}
      <div className="footer-note">BTB World Cup 2026 Fantasy Challenge &middot; shared live via Supabase</div>
      <div className={`toast ${toast ? 'show' : ''}`}>{toast}</div>
    </div>
  );
}

function MatchCard({ m, pick, onSetPick, locked }) {
  return (
    <div className={`match-card ${locked ? 'locked' : ''}`}>
      <div className="match-meta">{m.pts} pts &middot; {ROUND_LABELS[m.round]}</div>
      <div className="match-teams">
        <div className="team-home">
          <div className="team-flag">{m.home_flag}</div>
          <div className="team-name">{m.home_team}</div>
        </div>
        <div className="match-sep">vs</div>
        <div className="team-away">
          <div className="team-flag">{m.away_flag}</div>
          <div className="team-name">{m.away_team}</div>
        </div>
      </div>
      <div className="result-btns">
        <button className={`result-btn ${pick==='home'?'picked-home':''}`} disabled={locked} onClick={() => onSetPick(m.id, 'home')}>{m.home_team.split(' ')[0]} win</button>
        <button className={`result-btn ${pick==='draw'?'picked-draw':''}`} disabled={locked} onClick={() => onSetPick(m.id, 'draw')}>Draw</button>
        <button className={`result-btn ${pick==='away'?'picked-away':''}`} disabled={locked} onClick={() => onSetPick(m.id, 'away')}>{m.away_team.split(' ')[0]} win</button>
      </div>
    </div>
  );
}

function groupMatchesByRound(matches) {
  const byRound = {};
  matches.forEach(m => {
    if (!byRound[m.round]) byRound[m.round] = [];
    byRound[m.round].push(m);
  });
  return byRound;
}

function PicksTab({ players, matches, picks, setPicks, savePicksForPlayer, showToast, locks }) {
  const [active, setActive] = useState(players[0] || null);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  useEffect(() => {
    if (!active || !players.includes(active)) setActive(players[0] || null);
  }, [players, active]);

  if (players.length === 0) {
    return <div className="empty-state"><div className="icon">⚽</div>Add players in the Setup tab first.</div>;
  }

  if (matches.length === 0) {
    return <div className="empty-state"><div className="icon">⚽</div>No fixtures loaded yet. Go to Setup and tap "Sync now" to load matches from ESPN.</div>;
  }

  const playerPicks = picks[active] || {};
  const total = matches.length;
  const done = matches.filter(m => playerPicks[m.id]).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const groupLocked = !!locks?.group_locked;
  const koLocked = !!locks?.knockout_locked;
  const allLocked = groupLocked && koLocked;

  const onSetPick = (matchId, pick) => {
    setPicks(prev => {
      const playerMap = { ...(prev[active] || {}) };
      playerMap[matchId] = pick;
      return { ...prev, [active]: playerMap };
    });
    setSaved(false);
  };

  const onSave = async () => {
    setSaving(true);
    const ok = await savePicksForPlayer(active, picks[active] || {});
    setSaving(false);
    if (ok) {
      setSaved(true);
      showToast(`${active}'s picks saved`);
      setTimeout(() => setSaved(false), 2000);
    }
  };

  const byRound = groupMatchesByRound(matches);
  const groupMatches = byRound.group || [];
  const groupsPresent = [...new Set(groupMatches.map(m => m.group_name).filter(Boolean))].sort();
  const knockoutRounds = ROUND_ORDER.filter(r => r !== 'group' && byRound[r] && byRound[r].length > 0);

  return (
    <div>
      {groupLocked && (
        <div className="lock-banner">
          <span>🔒</span>
          <span>Group stage picks are locked &mdash; the tournament has started for this stage.</span>
        </div>
      )}
      {koLocked && (
        <div className="lock-banner">
          <span>🔒</span>
          <span>Knockout stage picks are locked.</span>
        </div>
      )}
      <p className="section-label">Picking for</p>
      <div className="player-selector">
        {players.map(p => (
          <button key={p} className={`player-btn ${p === active ? 'selected' : ''}`} onClick={() => setActive(p)}>{p}</button>
        ))}
      </div>
      <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'1.25rem'}}>
        <div className="progress-bar"><div className="progress-fill" style={{width: `${pct}%`}}></div></div>
        <span style={{fontSize:'12px', color:'var(--text-secondary)', whiteSpace:'nowrap'}}>{done}/{total} picked</span>
      </div>

      {groupMatches.length > 0 && (
        <>
          <p className="section-label">Group stage</p>
          {groupsPresent.map(g => (
            <div key={g}>
              <div className="group-header"><span className="group-badge">Group {g}</span></div>
              {groupMatches.filter(m => m.group_name === g).map(m => (
                <MatchCard key={m.id} m={m} pick={playerPicks[m.id]} onSetPick={onSetPick} locked={groupLocked} />
              ))}
            </div>
          ))}
          {groupMatches.some(m => !m.group_name) && (
            <div>
              <div className="group-header"><span className="group-badge">Other group matches</span></div>
              {groupMatches.filter(m => !m.group_name).map(m => (
                <MatchCard key={m.id} m={m} pick={playerPicks[m.id]} onSetPick={onSetPick} locked={groupLocked} />
              ))}
            </div>
          )}
        </>
      )}

      {knockoutRounds.length > 0 && (
        <>
          <p className="section-label" style={{marginTop:'1.5rem'}}>Knockout stage</p>
          {knockoutRounds.map(r => (
            <div key={r}>
              <div className="ko-round-label">{ROUND_LABELS[r]}</div>
              {byRound[r].map(m => (
                <MatchCard key={m.id} m={m} pick={playerPicks[m.id]} onSetPick={onSetPick} locked={koLocked} />
              ))}
            </div>
          ))}
        </>
      )}

      {knockoutRounds.length === 0 && (
        <p style={{fontSize:'12px', color:'var(--text-tertiary)', marginTop:'1.5rem'}}>
          Knockout stage matchups aren't available yet &mdash; they'll appear here once ESPN publishes the Round of 32 bracket.
        </p>
      )}

      <button className={`save-btn ${saved ? 'saved' : ''}`} onClick={onSave} disabled={saving || allLocked}>
        {saving ? 'Saving...' : saved ? `✓ Saved` : allLocked ? 'Picks locked' : `Save ${active}'s picks`}
      </button>
    </div>
  );
}

function ResultDisplay({ m }) {
  const hasResult = !!m.result;
  let resultLabel = 'No result yet';
  if (hasResult) {
    if (m.result === 'home') resultLabel = `${m.home_team} win`;
    else if (m.result === 'away') resultLabel = `${m.away_team} win`;
    else resultLabel = 'Draw';
  }
  return (
    <div className="admin-card">
      <div className="result-row">
        <span className="r-name">{m.home_flag} {m.home_team}</span>
        <span className="r-vs">vs</span>
        <span className="r-name" style={{textAlign:'right'}}>{m.away_flag} {m.away_team}</span>
      </div>
      <div className={`result-status ${hasResult ? 'has-result' : ''}`}>{resultLabel}</div>
    </div>
  );
}

      <div>

  return (

      <p className="section-label">Match results</p>
      <div className="card espn-sync-card">
        <div>
          <div className="lock-title">Live results from ESPN</div>
          <div className="lock-sub">
            {espnError ? 'Sync failed \u2014 check Cloudflare worker proxy' : lastSyncLabel ? `Last synced ${lastSyncLabel}` : 'Tap Sync now to refresh'}
          </div>
        </div>
        <button className="btn" onClick={onEspnSync} disabled={espnSyncing}>
          {espnSyncing ? 'Syncing...' : 'Sync now'}
        </button>
      </div>
      <p style={{fontSize:'13px', color:'var(--text-secondary)', marginBottom:'1rem'}}>
        Results sync directly from ESPN &mdash; tap "Sync now" to refresh. The leaderboard updates live for everyone once synced.
      </p>

      {groupMatches.length > 0 && (
        <>
          <p className="section-label">Group stage</p>
          {groupsPresent.map(g => (
            <div key={g}>

              {groupMatches.filter(m => m.group_name === g).map(m => (

              ))}
            </div>
          ))}
          {groupMatches.some(m => !m.group_name) && (
            <div>
              <div className="group-header"><span className="group-badge">Other group matches</span></div>
              {groupMatches.filter(m => !m.group_name).map(m => (
                <ResultDisplay key={m.id} m={m} />
              ))}
            </div>
          )}
        </>
      )}

      {knockoutRounds.length > 0 && (
        <>
          <p className="section-label" style={{marginTop:'1.5rem'}}>Knockout stage</p>
          {knockoutRounds.map(r => (
            <div key={r}>
              <div className="ko-round-label">{ROUND_LABELS[r]}</div>
              {byRound[r].map(m => (
                <ResultDisplay key={m.id} m={m} />
              ))}
            </div>
          ))}
        </>
      )}
    </div>
  );
}

function calcPoints(playerPicks, matches) {
  let pts = 0, correct = 0, total = 0;
  matches.forEach(m => {
    if (!m.result) return;
    total++;
    const pick = playerPicks[m.id];
    if (pick && pick === m.result) {
      pts += m.pts;
      correct++;
    }
  });
  return { pts, correct, total };
}

function LeaderboardTab({ players, matches, picks }) {
  if (players.length === 0) {
    return <div className="empty-state"><div className="icon">⚽</div>Add players in the Setup tab first.</div>;
  }
  if (matches.length === 0) {
    return <div className="empty-state"><div className="icon">⚽</div>No fixtures loaded yet &mdash; sync from ESPN in the Setup tab.</div>;
  }

  const data = players
    .map(p => ({ name: p, ...calcPoints(picks[p] || {}, matches) }))
    .sort((a, b) => b.pts - a.pts);

  const medals = ['🥇', '🥈', '🥉'];
  const completedMatches = matches.filter(m => m.result);

  return (
    <div>
      <p className="section-label">Leaderboard &middot; {completedMatches.length} results in</p>
      <div className="card">
        <div className="lb-header">
          <span>#</span><span>Player</span><span>Pts</span><span>Hits</span>
        </div>
        {data.map((p, i) => (
          <div className="lb-row" key={p.name}>
            <div className={`lb-rank ${i < 3 ? 'top' : ''}`}>{medals[i] || i + 1}</div>
            <div className="lb-name">{p.name}</div>
            <div className="lb-pts">{p.pts}</div>
            <div className="lb-sub">{p.correct}/{p.total}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex', gap:'16px', flexWrap:'wrap', fontSize:'12px', color:'var(--text-tertiary)', marginTop:'0.5rem', padding:'0 4px'}}>
        <span>Pts = total points</span><span>Hits = correct / completed matches</span>
      </div>

      {completedMatches.length > 0 && (
        <>
          <p className="section-label" style={{marginTop:'1.5rem'}}>Pick breakdown</p>
          {completedMatches.map(m => (
            <div className="card" key={m.id} style={{padding:'0.75rem 1.25rem'}}>
              <div style={{fontSize:'13px', fontWeight:600, marginBottom:'6px'}}>
                {m.home_flag} {m.home_team} vs {m.away_flag} {m.away_team}
                <span style={{fontWeight:400, color:'var(--text-secondary)'}}>
                  {' '}&rarr; {m.result === 'home' ? `${m.home_team} win` : m.result === 'away' ? `${m.away_team} win` : 'Draw'}
                </span>
              </div>
              <div className="picks-summary">
                {players.map(p => {
                  const pick = (picks[p] || {})[m.id];
                  const correct = pick === m.result;
                  const cls = pick === 'home' ? 'home' : pick === 'draw' ? 'draw' : pick === 'away' ? 'away' : 'none';
                  return (
                    <span key={p} className={`pick-pill ${cls}`} title={`${p}: ${pick || 'no pick'}`}>
                      {p.split(' ')[0]} {correct ? '✓' : ''}{!pick ? '\u2014' : ''}
                    </span>
                  );
                })}
              </div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
