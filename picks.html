<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BTB WC 2026 - Group Stage Picks</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface-2: #f0f0f0;
    --border: #e0e0e0;
    --border-light: #cccccc;
    --text: #000000;
    --text-secondary: #5e5e5e;
    --text-tertiary: #8c8c8c;
    --blue: #ec0016;
    --blue-bg: #fde8ea;
    --blue-text: #ec0016;
    --green: #00a14b;
    --green-bg: #e3f5ec;
    --green-text: #00763a;
    --amber: #d97706;
    --amber-bg: #fdf1e0;
    --red: #ec0016;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; min-height: 100vh; }
  .app { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .trophy { font-size: 26px; }
  .header h1 { font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }
  .header-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .top-link { font-size: 13px; color: var(--blue-text); text-decoration: none; font-weight: 500; white-space: nowrap; }
  .top-link:hover { text-decoration: underline; }

  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); margin-bottom: 0.75rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 0.75rem; }

  .player-setup { display: flex; gap: 8px; }
  .player-setup input { flex: 1; }
  input, select, button { font-family: inherit; font-size: 14px; }
  input[type="text"] {
    background: var(--surface-2); border: 1px solid var(--border-light); border-radius: var(--radius-md);
    color: var(--text); padding: 9px 12px; outline: none;
  }
  input[type="text"]:focus { border-color: var(--blue); }
  button { cursor: pointer; }
  .btn { background: var(--surface-2); border: 1px solid var(--border-light); border-radius: var(--radius-md); color: var(--text); padding: 9px 16px; font-weight: 500; transition: all 0.15s; }
  .btn:hover { background: var(--border-light); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.primary { background: var(--blue-bg); border-color: var(--blue); color: var(--blue-text); }

  .player-selector { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .player-btn { padding: 6px 14px; font-size: 13px; border-radius: 20px; border: 1px solid var(--border-light); background: var(--surface); cursor: pointer; color: var(--text-secondary); transition: all 0.1s; }
  .player-btn.selected { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue); font-weight: 500; }
  .player-btn:hover:not(.selected) { color: var(--text); border-color: var(--text-tertiary); }

  .group-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 1.25rem 0 0.5rem; }
  .group-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; background: var(--surface-2); border-radius: 20px; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; border: 1px solid var(--border); }
  .group-hint { font-size: 11px; color: var(--text-tertiary); }

  .rank-list { display: flex; flex-direction: column; gap: 6px; }
  .rank-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 8px 10px; }
  .rank-num { width: 26px; height: 26px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border-light); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0; }
  .rank-num.gold { background: #fff3cd; color: #946200; border-color: #f0d28a; }
  .rank-num.silver { background: #eef1f3; color: #5b6770; border-color: #cfd6db; }
  .rank-team-flag { font-size: 18px; }
  .rank-team-name { font-size: 14px; font-weight: 500; flex: 1; }
  .rank-arrows { display: flex; gap: 4px; }
  .arrow-btn { width: 28px; height: 28px; border-radius: var(--radius-md); border: 1px solid var(--border-light); background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text-secondary); cursor: pointer; }
  .arrow-btn:hover { color: var(--text); border-color: var(--text-tertiary); }
  .arrow-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .progress-bar { height: 4px; background: var(--surface-2); border-radius: 2px; margin-bottom: 1.25rem; overflow: hidden; flex: 1; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--blue); transition: width 0.3s; }

  .save-btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 600; margin-top: 1rem; background: var(--blue-bg); border: 1px solid var(--blue); border-radius: var(--radius-lg); cursor: pointer; color: var(--blue-text); transition: all 0.15s; }
  .save-btn.saved { background: var(--green-bg); border-color: var(--green); color: var(--green-text); }
  .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .lock-banner { display: flex; align-items: center; gap: 10px; background: var(--amber-bg); border: 1px solid var(--amber); border-radius: var(--radius-lg); padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 13px; color: var(--amber); }

  .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text-secondary); font-size: 14px; }
  .empty-state .icon { font-size: 32px; margin-bottom: 0.75rem; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); border: 1px solid var(--border-light); color: var(--surface); padding: 10px 22px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  .loading { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border-light); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-note { text-align: center; font-size: 12px; color: var(--text-tertiary); margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react,env">
const { useState, useEffect, useCallback } = React;

const SUPABASE_URL = "https://wmxxomiuzdhmvysefrjg.supabase.co";
const SUPABASE_KEY = "sb_publishable_oMyje3R_YGvTETd1qtLTCg_KC314Teu";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Real WC2026 groups, in initial/default order (FIFA seeding order, not a prediction)
const GROUPS = {
  A: ['Mexico', 'South Korea', 'Czechia', 'South Africa'],
  B: ['Switzerland', 'Canada', 'Qatar', 'Bosnia & Herzegovina'],
  C: ['Brazil', 'Morocco', 'Haiti', 'Scotland'],
  D: ['USA', 'Turkey', 'Australia', 'Paraguay'],
  E: ['Germany', 'Ecuador', 'Ivory Coast', 'Curaçao'],
  F: ['Netherlands', 'Japan', 'Sweden', 'Tunisia'],
  G: ['Belgium', 'Egypt', 'Iran', 'New Zealand'],
  H: ['Spain', 'Cape Verde', 'Saudi Arabia', 'Uruguay'],
  I: ['France', 'Senegal', 'Iraq', 'Norway'],
  J: ['Argentina', 'Algeria', 'Austria', 'Jordan'],
  K: ['Portugal', 'DR Congo', 'Uzbekistan', 'Colombia'],
  L: ['England', 'Croatia', 'Ghana', 'Panama']
};
const GROUP_NAMES = Object.keys(GROUPS);

const FLAGS = {
  'Mexico': '\u{1F1F2}\u{1F1FD}', 'South Africa': '\u{1F1FF}\u{1F1E6}', 'South Korea': '\u{1F1F0}\u{1F1F7}', 'Korea Republic': '\u{1F1F0}\u{1F1F7}', 'Czechia': '\u{1F1E8}\u{1F1FF}', 'Czech Republic': '\u{1F1E8}\u{1F1FF}',
  'Switzerland': '\u{1F1E8}\u{1F1ED}', 'Canada': '\u{1F1E8}\u{1F1E6}', 'Qatar': '\u{1F1F6}\u{1F1E6}', 'Bosnia & Herzegovina': '\u{1F1E7}\u{1F1E6}', 'Bosnia and Herzegovina': '\u{1F1E7}\u{1F1E6}',
  'Brazil': '\u{1F1E7}\u{1F1F7}', 'Morocco': '\u{1F1F2}\u{1F1E6}', 'Haiti': '\u{1F1ED}\u{1F1F9}', 'Scotland': '\u{1F3F4}',
  'USA': '\u{1F1FA}\u{1F1F8}', 'United States': '\u{1F1FA}\u{1F1F8}', 'Turkey': '\u{1F1F9}\u{1F1F7}', 'Türkiye': '\u{1F1F9}\u{1F1F7}', 'Australia': '\u{1F1E6}\u{1F1FA}', 'Paraguay': '\u{1F1F5}\u{1F1FE}',
  'Germany': '\u{1F1E9}\u{1F1EA}', 'Ecuador': '\u{1F1EA}\u{1F1E8}', 'Ivory Coast': '\u{1F1E8}\u{1F1EE}', "Côte d'Ivoire": '\u{1F1E8}\u{1F1EE}', 'Curacao': '\u{1F1E8}\u{1F1FC}', 'Curaçao': '\u{1F1E8}\u{1F1FC}',
  'Netherlands': '\u{1F1F3}\u{1F1F1}', 'Japan': '\u{1F1EF}\u{1F1F5}', 'Sweden': '\u{1F1F8}\u{1F1EA}', 'Tunisia': '\u{1F1F9}\u{1F1F3}',
  'Belgium': '\u{1F1E7}\u{1F1EA}', 'Egypt': '\u{1F1EA}\u{1F1EC}', 'Iran': '\u{1F1EE}\u{1F1F7}', 'IR Iran': '\u{1F1EE}\u{1F1F7}', 'New Zealand': '\u{1F1F3}\u{1F1FF}',
  'Spain': '\u{1F1EA}\u{1F1F8}', 'Cape Verde': '\u{1F1E8}\u{1F1FB}', 'Cabo Verde': '\u{1F1E8}\u{1F1FB}', 'Saudi Arabia': '\u{1F1F8}\u{1F1E6}', 'Uruguay': '\u{1F1FA}\u{1F1FE}',
  'France': '\u{1F1EB}\u{1F1F7}', 'Senegal': '\u{1F1F8}\u{1F1F3}', 'Iraq': '\u{1F1EE}\u{1F1F6}', 'Norway': '\u{1F1F3}\u{1F1F4}',
  'Argentina': '\u{1F1E6}\u{1F1F7}', 'Algeria': '\u{1F1E9}\u{1F1FF}', 'Austria': '\u{1F1E6}\u{1F1F9}', 'Jordan': '\u{1F1EF}\u{1F1F4}',
  'Portugal': '\u{1F1F5}\u{1F1F9}', 'DR Congo': '\u{1F1E8}\u{1F1E9}', 'Congo DR': '\u{1F1E8}\u{1F1E9}', 'Uzbekistan': '\u{1F1FA}\u{1F1FF}', 'Colombia': '\u{1F1E8}\u{1F1F4}',
  'England': '\u{1F3F4}', 'Croatia': '\u{1F1ED}\u{1F1F7}', 'Ghana': '\u{1F1EC}\u{1F1ED}', 'Panama': '\u{1F1F5}\u{1F1E6}'
};
function flagFor(team) { return FLAGS[team] || '\u{1F30D}'; }

const RANK_LABELS = ['1st', '2nd', '3rd', '4th'];

function useToast() {
  const [msg, setMsg] = useState(null);
  const show = useCallback((m) => {
    setMsg(m);
    setTimeout(() => setMsg(null), 2200);
  }, []);
  return [msg, show];
}

function rankClass(i) {
  if (i === 0) return 'gold';
  if (i === 1) return 'silver';
  return '';
}

function GroupRanker({ groupName, order, onMove, locked }) {
  return (
    <div>
      <div className="group-header">
        <span className="group-badge">Group {groupName}</span>
        <span className="group-hint">1st &amp; 2nd advance to knockout</span>
      </div>
      <div className="rank-list">
        {order.map((team, i) => (
          <div className="rank-row" key={team}>
            <div className={`rank-num ${rankClass(i)}`}>{i + 1}</div>
            <span className="rank-team-flag">{flagFor(team)}</span>
            <span className="rank-team-name">{team}</span>
            <div className="rank-arrows">
              <button className="arrow-btn" disabled={locked || i === 0} onClick={() => onMove(groupName, i, -1)} title="Move up">&uarr;</button>
              <button className="arrow-btn" disabled={locked || i === order.length - 1} onClick={() => onMove(groupName, i, 1)} title="Move down">&darr;</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [players, setPlayers] = useState([]);
  const [locks, setLocks] = useState({ group_picks_locked: false });
  const [loading, setLoading] = useState(true);
  const [toast, showToast] = useToast();

  const [name, setName] = useState('');
  const [active, setActive] = useState(() => localStorage.getItem('wc2026_player') || null);
  const [order, setOrder] = useState(() => {
    const initial = {};
    GROUP_NAMES.forEach(g => { initial[g] = [...GROUPS[g]]; });
    return initial;
  });
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  const loadAll = useCallback(async () => {
    try {
      const [{ data: pl, error: e1 }, { data: st, error: e2 }] = await Promise.all([
        supabase.from('players').select('*').order('created_at', { ascending: true }),
        supabase.from('tournament_status').select('*').eq('id', 1).maybeSingle()
      ]);
      if (e1) throw e1;
      if (e2) console.error('Status load error', e2);

      setPlayers((pl || []).map(p => p.name));
      if (st) setLocks({ group_picks_locked: !!st.group_picks_locked });
    } catch (err) {
      console.error('Load error', err);
      showToast('Could not load tournament data');
    } finally {
      setLoading(false);
    }
  }, [showToast]);

  useEffect(() => { loadAll(); }, [loadAll]);

  // Load this player's existing group rankings
  useEffect(() => {
    if (!active) return;
    (async () => {
      const { data, error } = await supabase.from('group_picks').select('*').eq('player_name', active);
      if (error) { console.error(error); return; }
      if (!data || data.length === 0) return;
      const next = {};
      GROUP_NAMES.forEach(g => { next[g] = [...GROUPS[g]]; });
      // Build ordered arrays from saved predicted_rank values
      const byGroup = {};
      data.forEach(row => {
        if (!byGroup[row.group_name]) byGroup[row.group_name] = [];
        byGroup[row.group_name].push(row);
      });
      Object.entries(byGroup).forEach(([g, rows]) => {
        const sorted = rows.sort((a, b) => a.predicted_rank - b.predicted_rank);
        const teams = sorted.map(r => r.team);
        // Only use if it's a complete, valid set for this group
        if (teams.length === GROUPS[g].length && teams.every(t => GROUPS[g].includes(t))) {
          next[g] = teams;
        }
      });
      setOrder(next);
    })();
  }, [active]);

  const registerOrSelect = async () => {
    const trimmed = name.trim();
    if (!trimmed) { showToast('Enter your name'); return; }

    if (!players.includes(trimmed)) {
      const { error } = await supabase.from('players').insert({ name: trimmed });
      if (error && error.code !== '23505') {
        showToast('Could not register');
        console.error(error);
        return;
      }
      setPlayers(prev => prev.includes(trimmed) ? prev : [...prev, trimmed]);
    }
    setActive(trimmed);
    localStorage.setItem('wc2026_player', trimmed);
    setName('');
    showToast(`Welcome, ${trimmed}!`);
  };

  const switchPlayer = () => {
    setActive(null);
    const initial = {};
    GROUP_NAMES.forEach(g => { initial[g] = [...GROUPS[g]]; });
    setOrder(initial);
    localStorage.removeItem('wc2026_player');
  };

  const onMove = (groupName, index, direction) => {
    setOrder(prev => {
      const arr = [...prev[groupName]];
      const newIndex = index + direction;
      if (newIndex < 0 || newIndex >= arr.length) return prev;
      [arr[index], arr[newIndex]] = [arr[newIndex], arr[index]];
      return { ...prev, [groupName]: arr };
    });
    setSaved(false);
  };

  const onSave = async () => {
    const rows = [];
    GROUP_NAMES.forEach(g => {
      order[g].forEach((team, i) => {
        rows.push({
          player_name: active,
          group_name: g,
          team: team,
          predicted_rank: i + 1
        });
      });
    });
    setSaving(true);
    // Delete existing rows for this player first (positions can shift, conflicts on unique constraints otherwise)
    const { error: delErr } = await supabase.from('group_picks').delete().eq('player_name', active);
    if (delErr) { setSaving(false); showToast('Save failed - check connection'); console.error(delErr); return; }
    const { error } = await supabase.from('group_picks').insert(rows);
    setSaving(false);
    if (error) { showToast('Save failed - check connection'); console.error(error); return; }
    setSaved(true);
    showToast('Group picks saved!');
    setTimeout(() => setSaved(false), 2000);
  };

  const groupLocked = !!locks.group_picks_locked;

  return (
    <div className="app">
      <div className="header">
        <div className="header-left">
          <span className="trophy">🏆</span>
          <div>
            <h1>BTB WC 2026</h1>
            <div className="header-sub">Group stage picks</div>
          </div>
        </div>
        <a className="top-link" href="./index.html">Standings &amp; results &rarr;</a>
      </div>

      {loading ? (
        <div className="loading"><div className="spinner"></div>Loading tournament data...</div>
      ) : !active ? (
        <div>
          <p className="section-label">Who are you?</p>
          <div className="card">
            <div className="player-setup">
              <input type="text" placeholder="Enter your name" value={name}
                onChange={e => setName(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') registerOrSelect(); }} />
              <button className="btn primary" onClick={registerOrSelect}>Continue</button>
            </div>
            {players.length > 0 && (
              <>
                <p style={{fontSize:'12px', color:'var(--text-tertiary)', margin:'1rem 0 0.5rem'}}>Or tap your name if you've already registered</p>
                <div className="player-selector">
                  {players.map(p => (
                    <button key={p} className="player-btn" onClick={() => { setActive(p); localStorage.setItem('wc2026_player', p); }}>{p}</button>
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      ) : (
        <div>
          <div className="card" style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'12px'}}>
            <div>
              <div style={{fontSize:'13px', fontWeight:600}}>Picking as {active}</div>
              <div style={{fontSize:'12px', color:'var(--text-tertiary)', marginTop:'2px'}}>Not you? Switch player below.</div>
            </div>
            <button className="btn" onClick={switchPlayer}>Switch</button>
          </div>

          {groupLocked && (
            <div className="lock-banner">
              <span>🔒</span>
              <span>Group stage picks are locked &mdash; the tournament has started.</span>
            </div>
          )}

          <div className="card" style={{marginTop:'1rem'}}>
            <p style={{fontSize:'13px', color:'var(--text-secondary)'}}>
              For each group, rank the 4 teams from 1st to 4th the way you think they'll finish.
              Use the arrows to reorder. Scoring: <strong>1pt</strong> for a correct 4th place,
              <strong> 2pts</strong> for 3rd, <strong>3pts</strong> for 2nd, and <strong>4pts</strong> for
              correctly picking the group winner &mdash; up to 48pts if you nail every group.
            </p>
          </div>

          <p className="section-label" style={{marginTop:'1.25rem'}}>Group rankings</p>
          {GROUP_NAMES.map(g => (
            <div className="card" key={g}>
              <GroupRanker groupName={g} order={order[g]} onMove={onMove} locked={groupLocked} />
            </div>
          ))}

          <button className={`save-btn ${saved ? 'saved' : ''}`} onClick={onSave} disabled={saving || groupLocked}>
            {saving ? 'Saving...' : saved ? '✓ Saved' : groupLocked ? 'Picks locked' : 'Save my group picks'}
          </button>

          <p style={{fontSize:'12px', color:'var(--text-tertiary)', textAlign:'center', marginTop:'1.5rem'}}>
            Once the group stage finishes, the playoff bracket will open on a separate page for your knockout picks.
          </p>
        </div>
      )}

      <div className="footer-note">BTB World Cup 2026 Fantasy Challenge</div>
      <div className={`toast ${toast ? 'show' : ''}`}>{toast}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
