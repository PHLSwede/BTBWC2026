<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BTB WC 2026 - Make Your Picks</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface-2: #f0f0f0;
    --border: #e0e0e0;
    --border-light: #cccccc;
    --text: #000000;
    --text-secondary: #5e5e5e;
    --text-tertiary: #8c8c8c;
    --blue: #ec0016;
    --blue-bg: #fde8ea;
    --blue-text: #ec0016;
    --green: #00a14b;
    --green-bg: #e3f5ec;
    --green-text: #00763a;
    --amber: #d97706;
    --amber-bg: #fdf1e0;
    --red: #ec0016;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; min-height: 100vh; }
  .app { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .trophy { font-size: 26px; }
  .header h1 { font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }
  .header-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .top-link { font-size: 13px; color: var(--blue-text); text-decoration: none; font-weight: 500; white-space: nowrap; }
  .top-link:hover { text-decoration: underline; }

  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); margin-bottom: 0.75rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 0.75rem; }

  .player-setup { display: flex; gap: 8px; }
  .player-setup input { flex: 1; }
  input, select, button { font-family: inherit; font-size: 14px; }
  input[type="text"], input[type="password"] {
    background: var(--surface-2); border: 1px solid var(--border-light); border-radius: var(--radius-md);
    color: var(--text); padding: 9px 12px; outline: none;
  }
  input[type="text"]:focus, input[type="password"]:focus { border-color: var(--blue); }
  button { cursor: pointer; }
  .btn { background: var(--surface-2); border: 1px solid var(--border-light); border-radius: var(--radius-md); color: var(--text); padding: 9px 16px; font-weight: 500; transition: all 0.15s; }
  .btn:hover { background: var(--border-light); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.primary { background: var(--blue-bg); border-color: var(--blue); color: var(--blue-text); }

  .player-selector { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .player-btn { padding: 6px 14px; font-size: 13px; border-radius: 20px; border: 1px solid var(--border-light); background: var(--surface); cursor: pointer; color: var(--text-secondary); transition: all 0.1s; }
  .player-btn.selected { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue); font-weight: 500; }
  .player-btn:hover:not(.selected) { color: var(--text); border-color: var(--text-tertiary); }

  .match-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 0.9rem 1.25rem; margin-bottom: 0.5rem; }
  .match-card.locked { opacity: 0.6; }
  .match-meta { font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px; letter-spacing: 0.04em; }
  .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .team-home { text-align: right; }
  .team-away { text-align: left; }
  .team-name { font-size: 14px; font-weight: 500; }
  .team-flag { font-size: 20px; }
  .match-sep { font-size: 12px; color: var(--text-tertiary); text-align: center; }
  .result-btns { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
  .result-btn { padding: 6px 14px; font-size: 12px; border: 1px solid var(--border-light); border-radius: 20px; background: var(--surface-2); cursor: pointer; color: var(--text-secondary); transition: all 0.1s; font-weight: 500; }
  .result-btn:hover { color: var(--text); border-color: var(--text-tertiary); }
  .result-btn.picked-home { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue); }
  .result-btn.picked-draw { background: var(--border-light); color: var(--text); border-color: var(--text-tertiary); }
  .result-btn.picked-away { background: var(--green-bg); color: var(--green-text); border-color: var(--green); }
  .result-btn:disabled { cursor: not-allowed; opacity: 0.7; }

  .group-header { display: flex; align-items: center; gap: 8px; margin: 1.25rem 0 0.5rem; }
  .group-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; background: var(--surface-2); border-radius: 20px; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; border: 1px solid var(--border); }

  .progress-bar { height: 4px; background: var(--surface-2); border-radius: 2px; margin-bottom: 1.25rem; overflow: hidden; flex: 1; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--blue); transition: width 0.3s; }

  .save-btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 600; margin-top: 1rem; background: var(--blue-bg); border: 1px solid var(--blue); border-radius: var(--radius-lg); cursor: pointer; color: var(--blue-text); transition: all 0.15s; }
  .save-btn.saved { background: var(--green-bg); border-color: var(--green); color: var(--green-text); }
  .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .ko-round-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); margin: 1.1rem 0 0.5rem; }

  .lock-banner { display: flex; align-items: center; gap: 10px; background: var(--amber-bg); border: 1px solid var(--amber); border-radius: var(--radius-lg); padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 13px; color: var(--amber); }

  .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text-secondary); font-size: 14px; }
  .empty-state .icon { font-size: 32px; margin-bottom: 0.75rem; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); border: 1px solid var(--border-light); color: var(--surface); padding: 10px 22px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  .loading { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border-light); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-note { text-align: center; font-size: 12px; color: var(--text-tertiary); margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react,env">
const { useState, useEffect, useCallback } = React;

const SUPABASE_URL = "https://wmxxomiuzdhmvysefrjg.supabase.co";
const SUPABASE_KEY = "sb_publishable_oMyje3R_YGvTETd1qtLTCg_KC314Teu";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ROUND_POINTS = { group: 2, r32: 3, r16: 4, qf: 5, sf: 6, final: 8 };
const ROUND_LABELS = {
  group: 'Group stage',
  r32: 'Round of 32',
  r16: 'Round of 16',
  qf: 'Quarter-finals',
  sf: 'Semi-finals',
  final: 'Final'
};
const ROUND_ORDER = ['group', 'r32', 'r16', 'qf', 'sf', 'final'];

function useToast() {
  const [msg, setMsg] = useState(null);
  const show = useCallback((m) => {
    setMsg(m);
    setTimeout(() => setMsg(null), 2200);
  }, []);
  return [msg, show];
}

function groupMatchesByRound(matches) {
  const byRound = {};
  matches.forEach(m => {
    if (!byRound[m.round]) byRound[m.round] = [];
    byRound[m.round].push(m);
  });
  return byRound;
}

function MatchCard({ m, pick, onSetPick, locked }) {
  return (
    <div className={`match-card ${locked ? 'locked' : ''}`}>
      <div className="match-meta">{m.pts} pts &middot; {ROUND_LABELS[m.round]}</div>
      <div className="match-teams">
        <div className="team-home">
          <div className="team-flag">{m.home_flag}</div>
          <div className="team-name">{m.home_team}</div>
        </div>
        <div className="match-sep">vs</div>
        <div className="team-away">
          <div className="team-flag">{m.away_flag}</div>
          <div className="team-name">{m.away_team}</div>
        </div>
      </div>
      <div className="result-btns">
        <button className={`result-btn ${pick==='home'?'picked-home':''}`} disabled={locked} onClick={() => onSetPick(m.id, 'home')}>{m.home_team.split(' ')[0]} win</button>
        <button className={`result-btn ${pick==='draw'?'picked-draw':''}`} disabled={locked} onClick={() => onSetPick(m.id, 'draw')}>Draw</button>
        <button className={`result-btn ${pick==='away'?'picked-away':''}`} disabled={locked} onClick={() => onSetPick(m.id, 'away')}>{m.away_team.split(' ')[0]} win</button>
      </div>
    </div>
  );
}

function App() {
  const [matches, setMatches] = useState([]);
  const [players, setPlayers] = useState([]);
  const [locks, setLocks] = useState({ group_locked: false, knockout_locked: false });
  const [loading, setLoading] = useState(true);
  const [toast, showToast] = useToast();

  // Registration / active player state
  const [name, setName] = useState('');
  const [active, setActive] = useState(() => localStorage.getItem('wc2026_player') || null);
  const [picks, setPicks] = useState({});
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  const loadAll = useCallback(async () => {
    try {
      const [{ data: mt, error: e1 }, { data: pl, error: e2 }, { data: st, error: e3 }] = await Promise.all([
        supabase.from('matches').select('*'),
        supabase.from('players').select('*').order('created_at', { ascending: true }),
        supabase.from('tournament_status').select('*').eq('id', 1).maybeSingle()
      ]);
      if (e1) throw e1;
      if (e2) throw e2;
      if (e3) console.error('Status load error', e3);

      setMatches(mt || []);
      setPlayers((pl || []).map(p => p.name));
      if (st) setLocks({ group_locked: !!st.group_locked, knockout_locked: !!st.knockout_locked });
    } catch (err) {
      console.error('Load error', err);
      showToast('Could not load tournament data');
    } finally {
      setLoading(false);
    }
  }, [showToast]);

  useEffect(() => { loadAll(); }, [loadAll]);

  // Load this player's existing picks once we know who's active
  useEffect(() => {
    if (!active) return;
    (async () => {
      const { data, error } = await supabase.from('picks').select('*').eq('player_name', active);
      if (error) { console.error(error); return; }
      const map = {};
      (data || []).forEach(row => { map[row.match_id] = row.pick; });
      setPicks(map);
    })();
  }, [active]);

  const registerOrSelect = async () => {
    const trimmed = name.trim();
    if (!trimmed) { showToast('Enter your name'); return; }

    if (!players.includes(trimmed)) {
      const { error } = await supabase.from('players').insert({ name: trimmed });
      if (error && error.code !== '23505') { // ignore duplicate-key race
        showToast('Could not register');
        console.error(error);
        return;
      }
      setPlayers(prev => prev.includes(trimmed) ? prev : [...prev, trimmed]);
    }
    setActive(trimmed);
    localStorage.setItem('wc2026_player', trimmed);
    setName('');
    showToast(`Welcome, ${trimmed}!`);
  };

  const switchPlayer = () => {
    setActive(null);
    setPicks({});
    localStorage.removeItem('wc2026_player');
  };

  const onSetPick = (matchId, pick) => {
    setPicks(prev => ({ ...prev, [matchId]: pick }));
    setSaved(false);
  };

  const onSave = async () => {
    const rows = Object.entries(picks)
      .filter(([, v]) => v)
      .map(([matchId, pick]) => ({ player_name: active, match_id: matchId, pick }));
    if (rows.length === 0) { showToast('No picks to save'); return; }
    setSaving(true);
    const { error } = await supabase.from('picks').upsert(rows, { onConflict: 'player_name,match_id' });
    setSaving(false);
    if (error) { showToast('Save failed - check connection'); console.error(error); return; }
    setSaved(true);
    showToast('Picks saved!');
    setTimeout(() => setSaved(false), 2000);
  };

  const byRound = groupMatchesByRound(matches);
  const groupMatches = byRound.group || [];
  const groupsPresent = [...new Set(groupMatches.map(m => m.group_name).filter(Boolean))].sort();
  const knockoutRounds = ROUND_ORDER.filter(r => r !== 'group' && byRound[r] && byRound[r].length > 0);

  const groupLocked = !!locks.group_locked;
  const koLocked = !!locks.knockout_locked;
  const allLocked = groupLocked && koLocked;

  const total = matches.length;
  const done = matches.filter(m => picks[m.id]).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  return (
    <div className="app">
      <div className="header">
        <div className="header-left">
          <span className="trophy">🏆</span>
          <div>
            <h1>BTB WC 2026</h1>
            <div className="header-sub">Make your picks</div>
          </div>
        </div>
        <a className="top-link" href="./index.html">Standings &amp; results &rarr;</a>
      </div>

      {loading ? (
        <div className="loading"><div className="spinner"></div>Loading tournament data...</div>
      ) : !active ? (
        <div>
          <p className="section-label">Who are you?</p>
          <div className="card">
            <div className="player-setup">
              <input type="text" placeholder="Enter your name" value={name}
                onChange={e => setName(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') registerOrSelect(); }} />
              <button className="btn primary" onClick={registerOrSelect}>Continue</button>
            </div>
            {players.length > 0 && (
              <>
                <p style={{fontSize:'12px', color:'var(--text-tertiary)', margin:'1rem 0 0.5rem'}}>Or tap your name if you've already registered</p>
                <div className="player-selector">
                  {players.map(p => (
                    <button key={p} className="player-btn" onClick={() => { setActive(p); localStorage.setItem('wc2026_player', p); }}>{p}</button>
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      ) : matches.length === 0 ? (
        <div className="empty-state"><div className="icon">⚽</div>No fixtures loaded yet. Check back soon.</div>
      ) : (
        <div>
          <div className="card" style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'12px'}}>
            <div>
              <div style={{fontSize:'13px', fontWeight:600}}>Picking as {active}</div>
              <div style={{fontSize:'12px', color:'var(--text-tertiary)', marginTop:'2px'}}>Not you? Switch player below.</div>
            </div>
            <button className="btn" onClick={switchPlayer}>Switch</button>
          </div>

          {groupLocked && (
            <div className="lock-banner">
              <span>🔒</span>
              <span>Group stage picks are locked &mdash; the tournament has started for this stage.</span>
            </div>
          )}
          {koLocked && (
            <div className="lock-banner">
              <span>🔒</span>
              <span>Knockout stage picks are locked.</span>
            </div>
          )}

          <div style={{display:'flex', alignItems:'center', gap:'10px', margin:'1.25rem 0'}}>
            <div className="progress-bar"><div className="progress-fill" style={{width: `${pct}%`}}></div></div>
            <span style={{fontSize:'12px', color:'var(--text-secondary)', whiteSpace:'nowrap'}}>{done}/{total} picked</span>
          </div>

          {groupMatches.length > 0 && (
            <>
              <p className="section-label">Group stage</p>
              {groupsPresent.map(g => (
                <div key={g}>
                  <div className="group-header"><span className="group-badge">Group {g}</span></div>
                  {groupMatches.filter(m => m.group_name === g).map(m => (
                    <MatchCard key={m.id} m={m} pick={picks[m.id]} onSetPick={onSetPick} locked={groupLocked} />
                  ))}
                </div>
              ))}
              {groupMatches.some(m => !m.group_name) && (
                <div>
                  <div className="group-header"><span className="group-badge">Other group matches</span></div>
                  {groupMatches.filter(m => !m.group_name).map(m => (
                    <MatchCard key={m.id} m={m} pick={picks[m.id]} onSetPick={onSetPick} locked={groupLocked} />
                  ))}
                </div>
              )}
            </>
          )}

          {knockoutRounds.length > 0 && (
            <>
              <p className="section-label" style={{marginTop:'1.5rem'}}>Knockout stage</p>
              {knockoutRounds.map(r => (
                <div key={r}>
                  <div className="ko-round-label">{ROUND_LABELS[r]}</div>
                  {byRound[r].map(m => (
                    <MatchCard key={m.id} m={m} pick={picks[m.id]} onSetPick={onSetPick} locked={koLocked} />
                  ))}
                </div>
              ))}
            </>
          )}

          {knockoutRounds.length === 0 && (
            <p style={{fontSize:'12px', color:'var(--text-tertiary)', marginTop:'1.5rem'}}>
              Knockout stage matchups aren't available yet &mdash; they'll appear here once the Round of 32 bracket is set.
            </p>
          )}

          <button className={`save-btn ${saved ? 'saved' : ''}`} onClick={onSave} disabled={saving || allLocked}>
            {saving ? 'Saving...' : saved ? '✓ Saved' : allLocked ? 'Picks locked' : 'Save my picks'}
          </button>
        </div>
      )}

      <div className="footer-note">BTB World Cup 2026 Fantasy Challenge</div>
      <div className={`toast ${toast ? 'show' : ''}`}>{toast}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
